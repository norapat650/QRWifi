<!DOCTYPE html>
<html>
<head>
    <title>QRWifi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2>QRWifi Login</h2>
    <p id="status">หน้าใหม่โหลดแล้ว...</p>

    <script>
        const LIFF_ID = "2009925736-skZwklvN";

        function setStatus(text) {
            document.getElementById("status").innerText = text;
        }

        async function main() {
            try {
                setStatus("JavaScript เริ่มทำงานแล้ว");

                if (typeof liff === "undefined") {
                    setStatus("โหลด LIFF SDK ไม่สำเร็จ");
                    return;
                }

                setStatus("กำลังเชื่อมต่อ LINE...");
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    setStatus("กำลัง login LINE...");
                    liff.login();
                    return;
                }

                setStatus("ดึงข้อมูล LINE...");
                const profile = await liff.getProfile();
                const lineUserId = profile.userId;

                setStatus("กำลังตรวจสอบข้อมูล...");
                const response = await fetch(`/check-user/?lineUserId=${encodeURIComponent(lineUserId)}`);
                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect_url;
                } else {
                    setStatus("เกิดข้อผิดพลาดจาก server");
                }

            } catch (error) {
                console.error(error);
                setStatus("LIFF error: " + error.message);
            }
        }

        window.addEventListener("load", main);
    </script>
</body>
</html>
