<!DOCTYPE html>
<html>
<head>
    <title>QRWifi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2>QRWifi Login</h2>
    <p id="status">หน้าใหม่โหลดแล้ว...</p>

    
    <script>
        const LIFF_ID = "2009925736-skZwklvN";
        const MIKROTIK_LOGIN_URL = "http://192.168.30.1/login";
        const WIFI_USERNAME = "freewifi";
        const WIFI_PASSWORD = "welcome";

        function setStatus(text) {
            document.getElementById("status").innerText = text;
        }

        function submitMikrotikLoginBackToCurrentPage() {
            setStatus("กำลังเชื่อมต่อ WiFi...");

            const form = document.createElement("form");
            form.method = "POST";
            form.action = MIKROTIK_LOGIN_URL;

            const fields = {
                username: WIFI_USERNAME,
                password: WIFI_PASSWORD,
                dst: window.location.href,
            };

            Object.keys(fields).forEach((key) => {
                const input = document.createElement("input");
                input.type = "hidden";
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            });

            document.body.appendChild(form);
            form.submit();
        }

        async function safeFetchJson(url) {
            const response = await fetch(url, {
                headers: {
                    "Accept": "application/json"
                }
            });

            const contentType = response.headers.get("content-type") || "";

            if (!contentType.includes("application/json")) {
                return {
                    success: false,
                    hotspot_blocked: true
                };
            }

            return await response.json();
        }

        async function main() {
            try {
                setStatus("JavaScript เริ่มทำงานแล้ว");

                if (typeof liff === "undefined") {
                    setStatus("โหลด LIFF SDK ไม่สำเร็จ");
                    return;
                }

                setStatus("กำลังเชื่อมต่อ LINE...");
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    setStatus("กำลังเข้าสู่ระบบ LINE...");
                    liff.login();
                    return;
                }

                setStatus("กำลังดึงข้อมูล LINE...");
                const profile = await liff.getProfile();
                const lineUserId = profile.userId;

                setStatus("กำลังตรวจสอบข้อมูล...");
                const data = await safeFetchJson(
                    `/check-user/?lineUserId=${encodeURIComponent(lineUserId)}`
                );

                if (data.hotspot_blocked) {
                    submitMikrotikLoginBackToCurrentPage();
                    return;
                }

                if (data.success) {
                    window.location.href = data.redirect_url;
                    return;
                }

                setStatus("ตรวจสอบข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");

            } catch (error) {
                console.error(error);
                setStatus("ระบบกำลังพยายามเชื่อมต่อ WiFi อีกครั้ง...");
                submitMikrotikLoginBackToCurrentPage();
            }
        }

        window.addEventListener("load", main);
    </script>
</body>
</html>
