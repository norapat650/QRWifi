<h1>🎉 Welcome</h1>
<p>LINE ID: {{ line_user_id }}</p>
<p>Campaign: {{ campaign }}</p>

<h3>Welcome Back / Customer Portal</h3>


<button onclick="connectWifi()" style="font-size:20px;padding:10px;">Connect WiFi</button>

<script>
  async function connectWifi() {
      const lineUserId = "{{ line_user_id }}";

      try {
          // send log to backend
          await fetch(`/log-connect/?lineUserId=${encodeURIComponent(lineUserId)}`);
      } catch (e) {
          console.error('log-connect failed', e);
      }

      alert("WiFi Connected (Demo Mode)");
      // future: redirect to router login URL
      // window.location.href = "http://192.168.1.1/login";
  }
</script>
